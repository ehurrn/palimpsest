[storage]
root = "/Users/herren/dev/palimpsest/working"

[db]
path = "{storage.root}/db/palimpsest.db"

[broker]
host = "localhost"
port = 8077
lease_ttl_seconds = 900
heartbeat_seconds = 120
max_attempts = 3

[mcp]
port = 8078

[harvest]
base_url = "https://www.osti.gov/opennet"
rate_limit_rps = 0.5
backoff_initial_s = 5
backoff_max_s = 300
user_agent = "palimpsest-research/0.1 (contact: j.eric.herren@gmail.com)"
accession_prefix = "NV"

[ocr]
engine_preference = ["vision", "tesseract"]
min_confidence = 0.5
rerun_if_osti_text_shorter_than = 200

[features]
redaction_context_chars = 300
redaction_context_lines = 2
blackbox_min_area_frac = 0.001
blackbox_max_area_frac = 0.25
blackbox_darkness_threshold = 60

[embed]
model = "nomic-embed"
dim = 768
chunk_chars = 800
chunk_overlap = 150

[gapjoin]
score_threshold = 0.65
w_cosine = 0.5
w_anchor = 0.3
w_kind = 0.2
topk_embedding_candidates = 50

[models]
extract = "llama"
classify = "qwen"
keep_alive = "24h"

[nodes]
gonktop = ["ocr", "features", "embed", "gapjoin"]
m4 = ["ocr", "features", "embed"]
